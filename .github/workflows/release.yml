name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset_name: TagForge-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            asset_name: TagForge-linux-x64
          - os: macos-latest
            rid: osx-arm64
            asset_name: TagForge-osx-arm64
          - os: macos-latest
            rid: osx-x64
            asset_name: TagForge-osx-x64

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish
      run: |
        dotnet publish TagForge.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o ./publish
    
    # Rename artifacts to include OS/Arch in filename
    - name: Rename Artifact (Windows)
      if: matrix.os == 'windows-latest'
      run: Move-Item ./publish/TagForge.exe ./publish/${{ matrix.asset_name }}

    - name: Rename Artifact (Unix)
      if: matrix.os != 'windows-latest'
      run: mv ./publish/TagForge ./publish/${{ matrix.asset_name }}

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./publish/${{ matrix.asset_name }}
        # Note: If multiple jobs run this, they will edit the same release safely.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
